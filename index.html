<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mochi Math Café — a cozy pastel calculator</title>
    <meta name="description" content="A super cute Tamagotchi-style café calculator with pastel buttons, a pixel cat, drifting clouds and floating hearts." />
    
    <!-- Open Graph Metadata -->
    <meta property="og:title" content="Mochi Math Café" />
    <meta property="og:description" content="A cozy pastel café calculator inspired by Tamagotchi and Japanese cafés." />
    <meta property="og:type" content="website" />
    
    <!-- Twitter Metadata -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:site" content="@MochiMathTreats" />
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Baloo+2:wght@400;600;700;800&family=Nunito:wght@500;600;700&display=swap" rel="stylesheet" />
    
    <!-- Link to our clean styles.css -->
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <!-- 1. BACKGROUND LAYERS (Clouds and Twinkling Stars) -->
    
    <!-- Drifting Clouds in the sky -->
    <div id="clouds-container" aria-hidden="true" class="clouds-layer">
      <div class="cloud-shape" style="position: absolute; top: 6%; width: 80px; height: 40px; opacity: 0.7; animation: mm-float-cloud 70s linear infinite; animation-delay: 0s;"></div>
      <div class="cloud-shape" style="position: absolute; top: 18%; width: 120px; height: 60px; opacity: 0.55; animation: mm-float-cloud 110s linear infinite; animation-delay: -20s;"></div>
      <div class="cloud-shape" style="position: absolute; top: 42%; width: 90px; height: 45px; opacity: 0.5; animation: mm-float-cloud 90s linear infinite; animation-delay: -40s;"></div>
      <div class="cloud-shape" style="position: absolute; top: 70%; width: 140px; height: 70px; opacity: 0.4; animation: mm-float-cloud 130s linear infinite; animation-delay: -10s;"></div>
    </div>

    <!-- Twinkling Sparkles container (We will make them appear using JavaScript!) -->
    <div id="sparkles-container" aria-hidden="true" class="sparkles-layer"></div>

    <!-- 2. HEADER SECTION (Logo, Title, and Waving Cat) -->
    <header class="header-container">
      <div class="header-title-box">
        <div class="header-icon-badge" aria-hidden="true">
          🍡
        </div>
        <div class="header-texts">
          <h1>Mochi Math Café</h1>
          <p>a simple cozy calculator</p>
        </div>
        <!-- Waving Mascot Cat -->
        <div class="waving-mascot-box" aria-hidden="true">
          <div class="waving-cat">🐱</div>
          <span class="waving-hand">👋</span>
        </div>
      </div>
    </header>

    <!-- 3. MAIN APP SECTION -->
    <main class="main-wrapper">
      
      <!-- LEFT SIDE: The Screen Card with Pixel Cat Mascot -->
      <div class="cafe-card">
        
        <!-- Shelf Lights (The colorful circles bouncing on top) -->
        <div class="shelf-lights-container" aria-hidden="true">
          <div class="shelf-lights"></div>
          <div class="shelf-lights">
            <span class="light-bulb" style="color: #ffd1dc; background: #ffd1dc; animation-delay: 0s;"></span>
            <span class="light-bulb" style="color: #ffe0b3; background: #ffe0b3; animation-delay: 0.15s;"></span>
            <span class="light-bulb" style="color: #c8f7c5; background: #c8f7c5; animation-delay: 0.3s;"></span>
            <span class="light-bulb" style="color: #d6c7ff; background: #d6c7ff; animation-delay: 0.45s;"></span>
            <span class="light-bulb" style="color: #bee3f8; background: #bee3f8; animation-delay: 0.6s;"></span>
            <span class="light-bulb" style="color: #ffd1dc; background: #ffd1dc; animation-delay: 0.75s;"></span>
          </div>
          <div class="shelf-lights"></div>
        </div>

        <!-- The green Screen -->
        <div class="screen-wrapper">
          
          <!-- Talking speech bubble from the cat -->
          <div class="bubble-positioner">
            <div class="speech-bubble" id="speech-bubble">Let's make it sweet!</div>
          </div>

          <!-- Cute Cat and Hot Beverage Steam -->
          <div class="mascot-area">
            
            <!-- Steam puffs rising from a virtual mug -->
            <div class="steam-container" aria-hidden="true">
              <span class="steam-puff" style="left: 0px; animation-delay: 0s;"></span>
              <span class="steam-puff" style="left: 8px; animation-delay: 0.6s;"></span>
              <span class="steam-puff" style="left: 16px; animation-delay: 1.2s;"></span>
            </div>

            <!-- Pixel Cat -->
            <div class="pixel-cat-container">
              <!-- Wiggling tail -->
              <span aria-hidden="true" class="cat-tail">〰️</span>

              <div class="cat-head">
                <!-- Ears -->
                <span class="cat-ear-left"></span>
                <span class="cat-ear-right"></span>

                <!-- Face -->
                <div class="cat-face-features">
                  <div class="cat-eyes">
                    <span class="cat-eye" style="animation-delay: 0s;"></span>
                    <span class="cat-eye" style="animation-delay: 0.4s;"></span>
                  </div>
                  <div class="cat-mouth">w</div>
                  
                  <!-- Blushing cheeks -->
                  <div class="cat-blush-left"></div>
                  <div class="cat-blush-right"></div>
                </div>
              </div>
              
              <!-- Red/Pink collar ribbon -->
              <div class="cat-collar"></div>
            </div>

          </div>

          <!-- The main calculator display screen! -->
          <div id="calc-display" class="screen-display-panel">
            0
          </div>
        </div>

        <p class="caption-under-screen">
          Tap a treat and take an order ♡
        </p>
      </div>

      <!-- RIGHT SIDE: The Order Panel with keys -->
      <div class="cafe-card">
        <h2 class="order-panel-title">Order Panel</h2>

        <!-- Keypad buttons grid -->
        <div class="button-grid">
          <!-- Row 1 -->
          <button id="btn-clear" class="cafe-button span-2" type="button">AC</button>
          <button id="btn-backspace" class="cafe-button" type="button" aria-label="Backspace">⌫</button>
          <button id="btn-op-berry" class="cafe-button op-berry" type="button" aria-label="Divide" title="Strawberry">
            <span>🍓</span>
            <span class="op-text">Divide</span>
          </button>

          <!-- Row 2 -->
          <button class="cafe-button btn-digit" type="button" data-digit="7">7</button>
          <button class="cafe-button btn-digit" type="button" data-digit="8">8</button>
          <button class="cafe-button btn-digit" type="button" data-digit="9">9</button>
          <button id="btn-op-cupcake" class="cafe-button op-cupcake" type="button" aria-label="Multiply" title="Cupcake">
            <span>🧁</span>
            <span class="op-text">Multiply</span>
          </button>

          <!-- Row 3 -->
          <button class="cafe-button btn-digit" type="button" data-digit="4">4</button>
          <button class="cafe-button btn-digit" type="button" data-digit="5">5</button>
          <button class="cafe-button btn-digit" type="button" data-digit="6">6</button>
          <button id="btn-op-matcha" class="cafe-button op-matcha" type="button" aria-label="Subtract" title="Matcha">
            <span>🍵</span>
            <span class="op-text">Subtract</span>
          </button>

          <!-- Row 4 -->
          <button class="cafe-button btn-digit" type="button" data-digit="1">1</button>
          <button class="cafe-button btn-digit" type="button" data-digit="2">2</button>
          <button class="cafe-button btn-digit" type="button" data-digit="3">3</button>
          <button id="btn-op-latte" class="cafe-button op-latte" type="button" aria-label="Add" title="Latte">
            <span>☕</span>
            <span class="op-text">Add</span>
          </button>

          <!-- Row 5 -->
          <button class="cafe-button btn-digit span-2" type="button" data-digit="0">0</button>
          <button id="btn-dot" class="cafe-button" type="button">.</button>
          <button id="btn-serve-heart" class="cafe-button serve-btn" type="button" aria-label="Serve">♡</button>
        </div>

        <!-- Big Serve Button -->
        <button id="btn-serve-large" type="button" class="cafe-button serve-btn btn-large-serve">
          Serve Order ✨
        </button>

        <!-- Receipt printing container -->
        <div id="receipt-container"></div>
      </div>

    </main>

    <!-- Connect our script -->
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
